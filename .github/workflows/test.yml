# Runs the full test suite on every push to main. When the suite passes,
# fast-forwards (or merges) main into develop so develop tracks the known-
# good tip of main automatically.
name: Test and sync to develop

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Don't let two pushes race the develop sync.
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Unit + integration tests (with coverage threshold gate)
        # Runs the unit + integration suites under V8 coverage. The
        # `coverage.thresholds` config in vitest.config.ts fails the
        # step if any of statements/branches/functions/lines drop below
        # the configured floors -- so this single step replaces the
        # per-suite invocations and gates coverage in one pass.
        run: npm run test:coverage

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: E2E tests (chromium + firefox)
        run: npm run test:e2e
        env:
          CI: '1'

      - name: Visual regression tests
        run: npm run test:visual
        env:
          CI: '1'

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  sync-develop:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # GITHUB_TOKEN can push to the same repo as long as the
          # workflow has `contents: write` and the target branch has no
          # protection rule that requires PR review. If develop is
          # protected, swap this for a PAT or a GitHub App token via
          # secrets and update the env var below.
          token: ${{ secrets.GITHUB_TOKEN }}
          # Make sure both branches are present locally regardless of
          # whether origin/develop exists yet.
          ref: main

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Print sync context
        run: |
          echo "Triggering SHA:    ${{ github.sha }}"
          echo "Repo:              ${{ github.repository }}"
          echo "Actor:             ${{ github.actor }}"
          git --version
          git remote -v
          git log -1 --oneline origin/main
          git ls-remote --heads origin develop || echo "(develop does not exist on origin yet)"

      - name: Fast-forward develop to main
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          if git ls-remote --exit-code --heads origin develop >/dev/null 2>&1; then
            echo "::group::develop exists on origin -- checking out and trying ff merge"
            git fetch --no-tags origin develop
            git checkout -B develop origin/develop
            if git merge --ff-only origin/main; then
              echo "Fast-forward merge succeeded."
            else
              echo "Develop has diverged; performing a merge commit."
              git merge --no-ff origin/main \
                -m "chore(ci): sync develop with tested main @ ${{ github.sha }}"
            fi
            echo "::endgroup::"
          else
            echo "develop missing on origin -- creating it at the tested main commit"
            git checkout -B develop origin/main
          fi

          echo "::group::local state before push"
          git status
          git log -3 --oneline develop
          echo "::endgroup::"

          # Verbose push so the log makes it obvious if a protected
          # branch / token scope rejected the update.
          git push --verbose origin develop:develop
