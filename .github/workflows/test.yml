# Runs the full test suite on every push to main. When the suite passes,
# fast-forwards (or merges) main into deploy, which triggers the
# `deploy.yml` workflow to publish the static site to GitHub Pages.
name: Test and publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Don't let two pushes race the deploy sync.
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Unit + integration tests (with coverage threshold gate)
        # Runs the unit + integration suites under V8 coverage. The
        # `coverage.thresholds` config in vitest.config.ts fails the
        # step if any of statements/branches/functions/lines drop below
        # the configured floors -- so this single step replaces the
        # per-suite invocations and gates coverage in one pass.
        run: npm run test:coverage

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: E2E tests (chromium + firefox)
        run: npm run test:e2e
        env:
          CI: '1'
          # Each suite writes a portable `blob` report to its own
          # subdirectory; the merge step below combines them into a
          # single HTML report.
          PLAYWRIGHT_BLOB_OUTPUT_DIR: blob-report/e2e

      - name: Visual regression tests
        run: npm run test:visual
        env:
          CI: '1'
          PLAYWRIGHT_BLOB_OUTPUT_DIR: blob-report/visual

      - name: Merge Playwright reports
        # Always runs, even after a test step failed, so the artifact
        # always contains a viewable report. `--reporter=html` writes
        # the merged output to `playwright-report/`.
        if: always()
        run: npx playwright merge-reports --reporter=html ./blob-report

      - name: Upload merged Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # GITHUB_TOKEN can push to the same repo as long as the
          # workflow has `contents: write` and the target branch has no
          # protection rule that requires PR review. If deploy is
          # protected, swap this for a PAT or a GitHub App token via
          # secrets and update the env var below.
          token: ${{ secrets.GITHUB_TOKEN }}
          # Make sure both branches are present locally regardless of
          # whether origin/deploy exists yet.
          ref: main

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Print sync context
        run: |
          echo "Triggering SHA:    ${{ github.sha }}"
          echo "Repo:              ${{ github.repository }}"
          echo "Actor:             ${{ github.actor }}"
          git --version
          git remote -v
          git log -1 --oneline origin/main
          git ls-remote --heads origin deploy || echo "(deploy does not exist on origin yet)"

      - name: Fast-forward deploy to main
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          if git ls-remote --exit-code --heads origin deploy >/dev/null 2>&1; then
            echo "::group::deploy exists on origin -- checking out and trying ff merge"
            git fetch --no-tags origin deploy
            git checkout -B deploy origin/deploy
            if git merge --ff-only origin/main; then
              echo "Fast-forward merge succeeded."
            else
              echo "Deploy has diverged; performing a merge commit."
              git merge --no-ff origin/main \
                -m "chore(ci): publish tested main @ ${{ github.sha }}"
            fi
            echo "::endgroup::"
          else
            echo "deploy missing on origin -- creating it at the tested main commit"
            git checkout -B deploy origin/main
          fi

          echo "::group::local state before push"
          git status
          git log -3 --oneline deploy
          echo "::endgroup::"

          # Verbose push so the log makes it obvious if a protected
          # branch / token scope rejected the update.
          git push --verbose origin deploy:deploy

      - name: Trigger deploy workflow
        # `git push` performed with GITHUB_TOKEN does not start
        # downstream `push`-triggered workflows (GitHub's anti-recursion
        # safeguard). `workflow_dispatch` is exempt, so we dispatch
        # deploy.yml explicitly against the deploy branch we just
        # advanced. The `actions: write` permission below is required
        # for this API call.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run deploy.yml --ref deploy
