<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 100 100"
  preserveAspectRatio="xMidYMid meet"
  width="100%"
  height="100%"
>
  <!-- Snake body (head-first); each cell is 9.6x9.6 on a 10x10 grid offset by 2 -->
  <g fill="#d4ffd4">
    <!-- Head -->
    <rect x="21.6" y="12" width="9.6" height="9.6" />
    <!-- Body, going right then down -->
    <rect x="31.2" y="12" width="9.6" height="9.6" />
    <rect x="40.8" y="12" width="9.6" height="9.6" />
    <rect x="50.4" y="12" width="9.6" height="9.6" />
    <rect x="50.4" y="21.6" width="9.6" height="9.6" />
    <rect x="50.4" y="31.2" width="9.6" height="9.6" />
    <rect x="50.4" y="40.8" width="9.6" height="9.6" />
    <rect x="60.0" y="40.8" width="9.6" height="9.6" />
  </g>

  <!-- Food pellet -->
  <rect x="79.2" y="60" width="9.6" height="9.6" fill="#ff6b6b" />
</svg>